<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Profile - Posts</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
  <div class="mobile-container">
  
    <header class="header">
      <h1>johndoe <span class="material-symbols-outlined">expand_more</span></h1>
      <div class="header-icons">
        <span class="material-symbols-outlined">add_box</span>
        <span class="material-symbols-outlined">menu</span>
      </div>
    </header>

   
    <section class="profile-info">
      <div class="profile-top">
        <div class="profile-pic">
          <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80" alt="Profile Picture">
        </div>
        <div class="stats">
          <div class="stat-item">
            <span class="count">12</span>
            <span class="label">Posts</span>
          </div>
          <div class="stat-item">
            <span class="count">4.5K</span>
            <span class="label">Followers</span>
          </div>
          <div class="stat-item">
            <span class="count">320</span>
            <span class="label">Following</span>
          </div>
        </div>
      </div>
      <div class="bio">
        <div class="bio-name">John Doe</div>
        <div class="bio-category" style="color: var(--gray-text);">Digital Creator</div>
        <div class="bio-text">Sharing my journey through photography and code. 📸💻<br>Building awesome things.</div>
        <a href="#" class="bio-link">github.com/johndoe</a>
      </div>
    </section>
    <div class="profile-actions">
      <button class="btn">Edit profile</button>
      <button class="btn">Share profile</button>
      <button class="btn btn-icon"><span class="material-symbols-outlined">person_add</span></button>
    </div>
    <div class="highlights">
      <div class="highlight-item">
        <div class="highlight-circle">
          <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=100&q=80" alt="Highlight 1">
        </div>
        <span class="highlight-label">Setup</span>
      </div>
      <div class="highlight-item">
        <div class="highlight-circle">
          <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=100&q=80" alt="Highlight 2">
        </div>
        <span class="highlight-label">Travel</span>
      </div>
      <div class="highlight-item">
        <div class="highlight-circle">
          <span class="material-symbols-outlined" style="font-size: 32px; color: #ccc; margin-top: 12px;">add</span>
        </div>
        <span class="highlight-label">New</span>
      </div>
    </div>
    <div class="tabs">
      <a href="index.html" class="tab active"><span class="material-symbols-outlined filled">grid_on</span></a>
      <a href="reels.html" class="tab"><span class="material-symbols-outlined">movie</span></a>
      <a href="tagged.html" class="tab"><span class="material-symbols-outlined">person_pin</span></a>
    </div>

    <div class="grid">
      <div class="grid-item"><img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=300&q=80" alt="Post"></div>
      <div class="grid-item"><img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=300&q=80" alt="Post"></div>
      <div class="grid-item"><img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=300&q=80" alt="Post"></div>
      <div class="grid-item"><img src="https://images.unsplash.com/photo-1516116216624-53e697fedbea?auto=format&fit=crop&w=300&q=80" alt="Post"></div>
      <div class="grid-item"><img src="https://images.unsplash.com/photo-1522199755839-a2bacb67c546?auto=format&fit=crop&w=300&q=80" alt="Post"></div>
      <div class="grid-item"><img src="https://images.unsplash.com/photo-1542831371-29b0f74f9713?auto=format&fit=crop&w=300&q=80" alt="Post"></div>
    </div>
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item"><span class="material-symbols-outlined">home</span></a>
      <a href="search.html" class="nav-item"><span class="material-symbols-outlined">search</span></a>
      <a href="#" class="nav-item"><span class="material-symbols-outlined">add_box</span></a>
      <a href="#" class="nav-item"><span class="material-symbols-outlined">movie</span></a>
      <a href="profile.html" class="nav-item"><span class="material-symbols-outlined filled">account_circle</span></a>
    </nav>
  </div>
</body>
</html>
