<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Semantic Layout</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 10px;
      padding: 10px;
    }

    header {
      background: #e2eaf2;
      border: 1px solid #c8d6e5;
      border-radius: 6px;
      padding: 30px 20px;
      text-align: center;
      font-size: 1rem;
      letter-spacing: 0.04em;
    }

    nav {
      background: #e2eaf2;
      border: 1px solid #c8d6e5;
      border-radius: 6px;
      padding: 20px;
      text-align: center;
      font-size: 1rem;
      letter-spacing: 0.04em;
    }

    main {
      display: grid;
      grid-template-columns: 220px 1fr 220px;
      gap: 10px;
    }

    aside {
      background: #e2eaf2;
      border: 1px solid #c8d6e5;
      border-radius: 6px;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      letter-spacing: 0.04em;
    }

    article {
      background: #e2eaf2;
      border: 1px solid #c8d6e5;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      letter-spacing: 0.04em;
    }

    footer {
      background: #e2eaf2;
      border: 1px solid #c8d6e5;
      border-radius: 6px;
      padding: 20px;
      text-align: center;
      font-size: 1rem;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <header>Header</header>

  <nav>Navigation Menu</nav>

  <main>
    <aside>Content</aside>
    <article>Main Content</article>
    <aside>Content</aside>
  </main>

  <footer>Footer</footer>

</body>
</html>
